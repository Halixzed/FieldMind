# Fly.io deployment config for Velsar backend
# Deploy: fly launch (first time) or fly deploy (subsequent)
# Docs:   https://fly.io/docs/

app = "velsar-backend"
primary_region = "lhr"  # London — closest to UK allotment target users

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false  # keep alive so sensor simulation loop runs continuously
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
